<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Bottom LEDs — Simulator</title>
    <style>
      :root {
        color-scheme: dark;
        /* Space reserved for the side menus and the bottom oscilloscope so the
           LED cloud sits centred between them and never overlaps a menu. */
        --ui-side: 270px;
        --ui-bottom: calc(30vh + 24px);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        top: 8px;
        left: var(--ui-side);
        right: var(--ui-side);
        bottom: var(--ui-bottom);
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        color: #cfd6e6;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
        max-width: 70vw;
        text-align: center;
      }
      #hud b {
        color: #fff;
      }
      #hud .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #555;
        vertical-align: middle;
      }
      #hud .dot.on {
        background: #4ade80;
        box-shadow: 0 0 8px #4ade80;
      }
      #hud .dot.err {
        background: #f87171;
        box-shadow: 0 0 8px #f87171;
      }
      #breathe-panel {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        z-index: 10;
        width: min(62vw, 760px);
        height: 30vh;
        max-height: 340px;
        min-height: 150px;
        padding: 8px 12px 10px;
        border-radius: 12px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        color: #cfd6e6;
        pointer-events: none;
        user-select: none;
        display: flex;
        flex-direction: column;
      }
      #breathe-panel.hidden {
        display: none;
      }
      #breathe-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 6px;
        pointer-events: auto;
        flex-wrap: wrap;
      }
      #breathe-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8b93a7;
      }
      .breathe-ctl {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #8b93a7;
      }
      .breathe-ctl button {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.06);
        color: #cfd6e6;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0;
      }
      .breathe-ctl button:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      #breathe-parts-val {
        min-width: 12px;
        text-align: center;
        color: #fff;
        font-size: 12px;
      }
      #breathe-swatches {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #breathe-swatches input[type="color"] {
        width: 26px;
        height: 20px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }
      #breathe-viz {
        flex: 1;
        width: 100%;
        height: 100%;
        pointer-events: auto;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="breathe-panel">
      <div id="breathe-head">
        <span id="breathe-title">breathing</span>
        <span class="breathe-ctl">
          <span>partitions</span>
          <button id="breathe-parts-dec" type="button">−</button>
          <span id="breathe-parts-val">3</span>
          <button id="breathe-parts-inc" type="button">+</button>
        </span>
        <span class="breathe-ctl">
          <span>colours</span>
          <span id="breathe-swatches"></span>
        </span>
      </div>
      <canvas id="breathe-viz"></canvas>
    </div>
    <div id="hud">
      <div><b>Cloud Bottom LEDs</b></div>
      <div id="hud-grid">—</div>
      <div id="hud-fps">—</div>
      <div><span id="hud-stream-dot" class="dot"></span><span id="hud-stream">stream: off</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
