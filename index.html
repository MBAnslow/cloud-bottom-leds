<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Bottom LEDs — Simulator</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        color: #cfd6e6;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
        max-width: 280px;
      }
      #hud b {
        color: #fff;
      }
      #hud .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #555;
        vertical-align: middle;
      }
      #hud .dot.on {
        background: #4ade80;
        box-shadow: 0 0 8px #4ade80;
      }
      #hud .dot.err {
        background: #f87171;
        box-shadow: 0 0 8px #f87171;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div><b>Cloud Bottom LEDs</b></div>
      <div id="hud-grid">—</div>
      <div id="hud-fps">—</div>
      <div><span id="hud-stream-dot" class="dot"></span><span id="hud-stream">stream: off</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
