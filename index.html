<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Bottom LEDs — Simulator</title>
    <style>
      :root {
        color-scheme: dark;
        /* Layout: top half = breathing + LED, bottom half = two menus. */
        --ui-pad: 10px;
        --ui-gap: 10px;
        /* Reserve enough vertical space for the 4-line status HUD. */
        --ui-hud-h: 92px;
        --ui-mid: 50vh;
        --ui-top-start: calc(var(--ui-pad) + var(--ui-hud-h) + var(--ui-gap));
        --ui-top-end: calc(var(--ui-mid) - var(--ui-gap) * 0.5);
        --ui-breathe-h: clamp(110px, 12vh, 150px);
        --ui-hist-h: 52px;
        --ui-app-top: calc(var(--ui-top-start) + var(--ui-breathe-h) + var(--ui-gap));
        --ui-app-h: calc(var(--ui-top-end) - var(--ui-app-top) - var(--ui-hist-h) - var(--ui-gap));
        --ui-menu-top: calc(var(--ui-mid) + var(--ui-gap) * 0.5);
        --ui-menu-h: calc(100vh - var(--ui-menu-top) - var(--ui-pad));
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        top: var(--ui-app-top);
        left: var(--ui-pad);
        right: var(--ui-pad);
        height: var(--ui-app-h);
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        z-index: 10;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        color: #cfd6e6;
        font-size: 12px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
        max-width: 70vw;
        text-align: center;
      }
      #hud b {
        color: #fff;
      }
      /* RGB histogram of the streamed bytes, docked just under the LED view. */
      #stream-hist {
        position: fixed;
        left: var(--ui-pad);
        right: var(--ui-pad);
        bottom: calc(100vh - var(--ui-top-end));
        height: var(--ui-hist-h);
        z-index: 9;
        border-radius: 8px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        pointer-events: none;
        user-select: none;
      }
      #hud .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #555;
        vertical-align: middle;
      }
      #hud .dot.on {
        background: #4ade80;
        box-shadow: 0 0 8px #4ade80;
      }
      #hud .dot.err {
        background: #f87171;
        box-shadow: 0 0 8px #f87171;
      }
      #config-actions {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 12;
        display: flex;
        gap: 8px;
      }
      #config-actions button {
        height: 28px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(10, 12, 20, 0.62);
        color: #cfd6e6;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }
      #config-actions button:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      #breathe-panel {
        position: fixed;
        left: 50%;
        top: var(--ui-top-start);
        bottom: auto;
        transform: translateX(-50%);
        z-index: 10;
        width: min(46vw, 560px);
        height: var(--ui-breathe-h);
        min-height: 110px;
        padding: 8px 12px 10px;
        border-radius: 12px;
        background: rgba(10, 12, 20, 0.55);
        backdrop-filter: blur(8px);
        color: #cfd6e6;
        pointer-events: none;
        user-select: none;
        display: flex;
        flex-direction: column;
      }
      #breathe-panel.hidden {
        display: none;
      }
      #breathe-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 6px;
        pointer-events: auto;
        flex-wrap: wrap;
      }
      #breathe-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8b93a7;
      }
      .breathe-ctl {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #8b93a7;
      }
      .breathe-ctl button {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.06);
        color: #cfd6e6;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0;
      }
      .breathe-ctl button:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      #breathe-parts-val {
        min-width: 12px;
        text-align: center;
        color: #fff;
        font-size: 12px;
      }
      #breathe-swatches {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #breathe-swatches input[type="color"] {
        width: 26px;
        height: 20px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }
      #breathe-viz {
        flex: 1;
        width: 100%;
        height: 100%;
        pointer-events: auto;
        cursor: crosshair;
      }
      .lil-gui {
        z-index: 11;
      }
      .lil-gui.autoPlace {
        top: var(--ui-menu-top);
        max-height: var(--ui-menu-h);
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="config-actions">
      <button id="cfg-save" type="button">Save</button>
      <button id="cfg-load" type="button">Load</button>
    </div>
    <div id="app"></div>
    <div id="breathe-panel">
      <div id="breathe-head">
        <span id="breathe-title">breathing</span>
        <span class="breathe-ctl">
          <span>partitions</span>
          <button id="breathe-parts-dec" type="button">−</button>
          <span id="breathe-parts-val">3</span>
          <button id="breathe-parts-inc" type="button">+</button>
        </span>
        <span class="breathe-ctl">
          <span>colours</span>
          <span id="breathe-swatches"></span>
        </span>
      </div>
      <canvas id="breathe-viz"></canvas>
    </div>
    <div id="hud">
      <div><b>Cloud Bottom LEDs</b></div>
      <div id="hud-grid">—</div>
      <div id="hud-fps">—</div>
      <div><span id="hud-stream-dot" class="dot"></span><span id="hud-stream">stream: off</span></div>
    </div>
    <canvas id="stream-hist" width="512" height="52"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
